<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory System Animation Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      color: #fff;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #0d9488;
    }
    #animation {
      width: 100%;
      height: 500px;
      background: #2a2a2a;
      border-radius: 8px;
      margin: 20px 0;
    }
    .controls {
      text-align: center;
      margin: 20px 0;
    }
    button {
      padding: 10px 20px;
      margin: 0 10px;
      background: #0d9488;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #0f766e;
    }
    .info {
      background: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .info p {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>记忆系统演进动画测试</h1>

    <div id="animation"></div>

    <div class="controls">
      <button onclick="animation.play()">播放</button>
      <button onclick="animation.pause()">暂停</button>
      <button onclick="animation.stop()">停止</button>
      <button onclick="animation.goToAndPlay(0)">重新播放</button>
    </div>

    <div class="info">
      <p><strong>动画信息：</strong></p>
      <p id="info">加载中...</p>
    </div>
  </div>

  <script>
    let animation;

    fetch('.vitepress/theme/components/animations/lottie/assets/memory-system.json')
      .then(response => response.json())
      .then(animationData => {
        document.getElementById('info').innerHTML = `
          版本: ${animationData.v}<br>
          帧率: ${animationData.fr} fps<br>
          总帧数: ${animationData.op} 帧<br>
          时长: ${(animationData.op / animationData.fr).toFixed(1)} 秒<br>
          尺寸: ${animationData.w}x${animationData.h}<br>
          图层数: ${animationData.layers.length}
        `;

        animation = lottie.loadAnimation({
          container: document.getElementById('animation'),
          renderer: 'svg',
          loop: true,
          autoplay: true,
          animationData: animationData
        });

        animation.addEventListener('DOMLoaded', () => {
          console.log('Animation loaded successfully');
        });

        animation.addEventListener('complete', () => {
          console.log('Animation completed');
        });

        animation.addEventListener('error', (error) => {
          console.error('Animation error:', error);
        });
      })
      .catch(error => {
        console.error('Failed to load animation:', error);
        document.getElementById('info').innerHTML = `<span style="color: #ef4444;">加载失败: ${error.message}</span>`;
      });
  </script>
</body>
</html>
